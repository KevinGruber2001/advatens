# Minimal docker-compose for production deployment on Hostinger
# This version doesn't require ChirpStack configuration files
# Use with: docker-compose -f docker-compose.minimal.yml up -d

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-advatens}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - advatens-network

  # Redis
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - advatens-network

  # Mosquitto MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    command: |
      sh -c "mkdir -p /mosquitto/config &&
             echo 'listener 1883' > /mosquitto/config/mosquitto.conf &&
             echo 'allow_anonymous true' >> /mosquitto/config/mosquitto.conf &&
             /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf"
    networks:
      - advatens-network

  # InfluxDB
  influxdb:
    image: influxdb:2
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-adminadmin}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-chirpstack}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-chirpstack}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - advatens-network

  # ChirpStack (without external config files - uses defaults)
  chirpstack:
    image: chirpstack/chirpstack:4
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_USER: ${DB_USERNAME:-postgres}
      POSTGRESQL_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRESQL_DB: ${DB_DATABASE:-advatens}
      REDIS_HOST: redis
      MQTT_BROKER_HOST: mosquitto
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mosquitto:
        condition: service_started
    networks:
      - advatens-network

  # Grafana
  grafana:
    image: grafana/grafana:11.1.5
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - influxdb
    networks:
      - advatens-network

  # Advatens Go API Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-advatens}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_SCHEMA: ${DB_SCHEMA:-public}

      # InfluxDB
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-chirpstack}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-chirpstack}

      # Clerk
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}

      # ChirpStack
      CHIRPSTACK_API_URL: chirpstack:8080
      CHIRPSTACK_API_TOKEN: ${CHIRPSTACK_API_TOKEN}
      CHIRPSTACK_APPLICATION_ID: ${CHIRPSTACK_APPLICATION_ID}
      CHIRPSTACK_DEVICE_PROFILE_ID: ${CHIRPSTACK_DEVICE_PROFILE_ID}
    depends_on:
      postgres:
        condition: service_healthy
      chirpstack:
        condition: service_started
      influxdb:
        condition: service_started
    networks:
      - advatens-network

  # Advatens React Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8888}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - advatens-network

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  grafana_data:

networks:
  advatens-network:
    driver: bridge
