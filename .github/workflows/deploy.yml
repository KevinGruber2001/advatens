name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual triggering from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /docker/advatens

            # Full repo sync — makes git the single source of truth for
            # everything, including the bind-mounted config files that the
            # old Hostinger action never synced (chirpstack-gateway-bridge.toml
            # and friends).
            git fetch origin main
            git reset --hard origin/main

            # .env is gitignored and rewritten fresh from GitHub secrets on
            # every deploy, so secrets only ever need to be rotated in one
            # place (GitHub), never manually on the server.
            cat > .env << 'ENVEOF'
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_SCHEMA=public
            CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
            CHIRPSTACK_API_SECRET=${{ secrets.CHIRPSTACK_API_SECRET }}
            CHIRPSTACK_ADMIN_EMAIL=${{ secrets.CHIRPSTACK_ADMIN_EMAIL }}
            CHIRPSTACK_ADMIN_PASSWORD=${{ secrets.CHIRPSTACK_ADMIN_PASSWORD }}
            CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            ENVEOF
            chmod 600 .env

            # --force-recreate guarantees every container picks up config
            # changes (image tags, env vars, or mounted file contents) on
            # every deploy — no more silently-stale containers.
            docker compose pull
            docker compose up -d --build --force-recreate --remove-orphans
