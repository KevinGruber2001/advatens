name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual triggering from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Deploy to Hostinger
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          project-name: advatens
          docker-compose-path: docker-compose.yml
          environment-variables: |
            # Database
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_SCHEMA=public

            # Clerk Authentication
            CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

            # ChirpStack
            CHIRPSTACK_API_SECRET=${{ secrets.CHIRPSTACK_API_SECRET }}
            CHIRPSTACK_ADMIN_EMAIL=${{ secrets.CHIRPSTACK_ADMIN_EMAIL }}
            CHIRPSTACK_ADMIN_PASSWORD=${{ secrets.CHIRPSTACK_ADMIN_PASSWORD }}

            # CORS: origins allowed to call the API
            CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}

            # Frontend
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
