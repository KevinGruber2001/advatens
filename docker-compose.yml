services:
  # TimescaleDB / PostgreSQL (shared by Advatens and ChirpStack)
  postgres:
    image: timescale/timescaledb:2.28.3-pg15
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_DATABASE:-advatens}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      # Loopback only: host-local dev access, never exposed to the internet.
      # 5433 avoids colliding with a natively installed Postgres on 5432.
      - "127.0.0.1:${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Extension setup, only executed when the data volume is first created
      - ./chirpstack/configuration/postgresql/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-advatens}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - advatens-network

  # Redis (for ChirpStack)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - advatens-network

  # Mosquitto MQTT Broker (for ChirpStack)
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      # Loopback only: the broker allows anonymous access, so it must never be
      # reachable from outside. Gateways talk to the bridges, not the broker.
      - "127.0.0.1:1883:1883"
    volumes:
      - ./chirpstack/configuration/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - advatens-network

  # ChirpStack LoRaWAN Network Server
  chirpstack:
    image: chirpstack/chirpstack:4
    restart: unless-stopped
    command: -c /etc/chirpstack
    ports:
      # Loopback only: reach the ChirpStack UI on a server via an SSH tunnel
      # (ssh -L 8080:localhost:8080 <host>).
      - "127.0.0.1:8080:8080"
    environment:
      CHIRPSTACK_API_SECRET: ${CHIRPSTACK_API_SECRET:-local-dev-secret-change-in-prod}
      POSTGRESQL_HOST: postgres
      POSTGRESQL_USER: ${DB_USERNAME:-postgres}
      POSTGRESQL_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRESQL_DB: ${DB_DATABASE:-advatens}
      REDIS_HOST: redis
      MQTT_BROKER_HOST: mosquitto
    volumes:
      - ./chirpstack/configuration/chirpstack:/etc/chirpstack:ro
      - chirpstack_lorawan_frames:/opt/lorawan-frames
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mosquitto:
        condition: service_started
    networks:
      - advatens-network

  # ChirpStack Gateway Bridge
  chirpstack-gateway-bridge:
    image: chirpstack/chirpstack-gateway-bridge:4
    restart: unless-stopped
    ports:
      - "1700:1700/udp"
    volumes:
      - ./chirpstack/configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge:ro
    depends_on:
      - mosquitto
    networks:
      - advatens-network

  # ChirpStack Gateway Bridge (Basic Station)
  chirpstack-gateway-bridge-basicstation:
    image: chirpstack/chirpstack-gateway-bridge:4
    restart: unless-stopped
    command: -c /etc/chirpstack-gateway-bridge/chirpstack-gateway-bridge-basicstation-eu868.toml
    ports:
      - "3002:3001"
    volumes:
      - ./chirpstack/configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge:ro
    depends_on:
      - mosquitto
    networks:
      - advatens-network

  # ChirpStack REST API
  chirpstack-rest-api:
    image: chirpstack/chirpstack-rest-api:4
    restart: unless-stopped
    command: --server chirpstack:8080 --bind 0.0.0.0:8090 --insecure
    ports:
      # Loopback only; nothing in the stack depends on the REST API.
      - "127.0.0.1:8090:8090"
    depends_on:
      - chirpstack
    networks:
      - advatens-network

  # Advatens Go API Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8888:8888"
    env_file: .env
    environment:
      # Docker-internal hostnames (override .env local values)
      DB_HOST: postgres
      DB_PORT: "5432"
      MQTT_BROKER_URL: tcp://mosquitto:1883
      CHIRPSTACK_API_URL: chirpstack:8080
    depends_on:
      postgres:
        condition: service_healthy
      chirpstack:
        condition: service_started
      mosquitto:
        condition: service_started
    networks:
      - advatens-network

  # Advatens React Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8888}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - advatens-network

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
  chirpstack_lorawan_frames:

networks:
  advatens-network:
    driver: bridge
