services:
  # Traefik reverse proxy: terminates TLS and routes agrinode.it / api.agrinode.it /
  # chirpstack.agrinode.it to the right container by Host header. It is the only
  # service that publishes 80/443; everything else is reached through it.
  traefik:
    image: traefik:v3.2
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      # Staging CA while we verify DNS/routing: issues untrusted-but-unlimited
      # test certs. Remove this line to switch to production Let's Encrypt.
      - --certificatesresolvers.le.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - advatens-network

  # TimescaleDB / PostgreSQL (shared by Advatens and ChirpStack)
  postgres:
    image: timescale/timescaledb:2.28.3-pg15
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_DATABASE:-advatens}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      # Loopback only: host-local dev access, never exposed to the internet.
      # 5433 avoids colliding with a natively installed Postgres on 5432.
      - "127.0.0.1:${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Extension setup, only executed when the data volume is first created
      - ./chirpstack/configuration/postgresql/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-advatens}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - advatens-network

  # Redis (for ChirpStack)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - advatens-network

  # Mosquitto MQTT Broker (for ChirpStack)
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      # Loopback only: the broker allows anonymous access, so it must never be
      # reachable from outside. Gateways talk to the bridges, not the broker.
      - "127.0.0.1:1883:1883"
    volumes:
      - ./chirpstack/configuration/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - advatens-network

  # ChirpStack LoRaWAN Network Server
  chirpstack:
    image: chirpstack/chirpstack:4
    restart: unless-stopped
    command: -c /etc/chirpstack
    # Reached through Traefik at chirpstack.agrinode.it (see labels below), not
    # published directly. Make sure CHIRPSTACK_ADMIN_PASSWORD is a strong,
    # non-default value — this is a login page and it will get scanned.
    labels:
      - traefik.enable=true
      - traefik.http.routers.chirpstack.rule=Host(`chirpstack.agrinode.it`)
      - traefik.http.routers.chirpstack.entrypoints=websecure
      - traefik.http.routers.chirpstack.tls.certresolver=le
      - traefik.http.services.chirpstack.loadbalancer.server.port=8080
    environment:
      CHIRPSTACK_API_SECRET: ${CHIRPSTACK_API_SECRET:-local-dev-secret-change-in-prod}
      POSTGRESQL_HOST: postgres
      POSTGRESQL_USER: ${DB_USERNAME:-postgres}
      POSTGRESQL_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRESQL_DB: ${DB_DATABASE:-advatens}
      REDIS_HOST: redis
      MQTT_BROKER_HOST: mosquitto
    volumes:
      - ./chirpstack/configuration/chirpstack:/etc/chirpstack:ro
      - chirpstack_lorawan_frames:/opt/lorawan-frames
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mosquitto:
        condition: service_started
    networks:
      - advatens-network

  # ChirpStack Gateway Bridge
  chirpstack-gateway-bridge:
    image: chirpstack/chirpstack-gateway-bridge:4
    restart: unless-stopped
    command: -c /etc/chirpstack-gateway-bridge/chirpstack-gateway-bridge.toml
    ports:
      - "1700:1700/udp"
    volumes:
      - ./chirpstack/configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge:ro
    depends_on:
      - mosquitto
    networks:
      - advatens-network

  # ChirpStack Gateway Bridge (Basic Station)
  chirpstack-gateway-bridge-basicstation:
    image: chirpstack/chirpstack-gateway-bridge:4
    restart: unless-stopped
    command: -c /etc/chirpstack-gateway-bridge/chirpstack-gateway-bridge-basicstation-eu868.toml
    ports:
      - "3002:3001"
    volumes:
      - ./chirpstack/configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge:ro
    depends_on:
      - mosquitto
    networks:
      - advatens-network

  # ChirpStack REST API
  chirpstack-rest-api:
    image: chirpstack/chirpstack-rest-api:4
    restart: unless-stopped
    command: --server chirpstack:8080 --bind 0.0.0.0:8090 --insecure
    ports:
      # Loopback only; nothing in the stack depends on the REST API.
      - "127.0.0.1:8090:8090"
    depends_on:
      - chirpstack
    networks:
      - advatens-network

  # Advatens Go API Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    # Reached through Traefik at api.agrinode.it (see labels below), not
    # published directly.
    labels:
      - traefik.enable=true
      - traefik.http.routers.server.rule=Host(`api.agrinode.it`)
      - traefik.http.routers.server.entrypoints=websecure
      - traefik.http.routers.server.tls.certresolver=le
      - traefik.http.services.server.loadbalancer.server.port=8888
    env_file: .env
    environment:
      # Docker-internal hostnames (override .env local values)
      DB_HOST: postgres
      DB_PORT: "5432"
      MQTT_BROKER_URL: tcp://mosquitto:1883
      CHIRPSTACK_API_URL: chirpstack:8080
    depends_on:
      postgres:
        condition: service_healthy
      chirpstack:
        condition: service_started
      mosquitto:
        condition: service_started
    networks:
      - advatens-network

  # Advatens React Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8888}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    restart: unless-stopped
    # Reached through Traefik at agrinode.it (see labels below), not published
    # directly.
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`agrinode.it`) || Host(`www.agrinode.it`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls.certresolver=le
      - traefik.http.services.frontend.loadbalancer.server.port=80
    depends_on:
      - server
    networks:
      - advatens-network

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
  chirpstack_lorawan_frames:
  traefik_letsencrypt:

networks:
  advatens-network:
    driver: bridge
